name: CI

# Trigger on pull requests AND on merge_group.
# The merge_group trigger is REQUIRED for merge queue: without it the queue's
# required checks never run and PRs get stuck "Queued" forever.
on:
  pull_request:
  merge_group:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build and test
        run: mvn -B test
